<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Student Registration Form</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f2f6f9;
            padding: 30px;
        }

        h1 {
            color: #2c3e50;
        }

        form {
            background-color: #ffffff;
            padding: 25px;
            width: 400px;
            border-radius: 8px;
        }

        label {
            display: block;
            margin-top: 12px;
            font-weight: bold;
        }

        input, select {
            margin-top: 5px;
        }

        .inline {
            display: inline;
            margin-right: 10px;
        }

        button {
            margin-top: 20px;
            padding: 8px 16px;
            font-size: 16px;
            background-color: #0984e3;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background-color: #0652dd;
        }
    </style>
</head>
<body>

    <h1>Student Registration Form</h1>

    <form>
        <!-- Text Boxes -->
        <label>Student Name:</label>
        <input type="text" name="name" placeholder="Enter your name">

        <label>Email:</label>
        <input type="email" name="email" placeholder="Enter your email">

        <label>Mobile Number:</label>
        <input type="text" name="mobile" placeholder="Enter mobile number">

        <!-- Radio Buttons -->
        <label>Gender:</label>
        <input type="radio" name="gender" value="male" class="inline"> Male
        <input type="radio" name="gender" value="female" class="inline"> Female

        <!-- Checkbox -->
        <label>Hobbies:</label>
        <input type="checkbox" name="hobby" value="reading" class="inline"> Reading
        <input type="checkbox" name="hobby" value="sports" class="inline"> Sports
        <input type="checkbox" name="hobby" value="music" class="inline"> Music

        <!-- Dropdown List -->
        <label>Course:</label>
        <select name="course">
            <option value="">-- Select Course --</option>
            <option>BCA</option>
            <option>BSc</option>
            <option>BCom</option>
            <option>BTech</option>
            <option>MCA</option>
        </select>

        <!-- Submit Button -->
        <br>
        <button type="submit">Submit</button>
    </form>

</body>
</html>
