<!DOCTYPE html>
<html>
<head>
    <title>Powers of 2</title>
</head>
<body>

<h2>Powers of 2 Less Than 100</h2>

<script>
let power = 1;

while (power < 100) {
    power = power * 2;
    
    if (power < 100) {
        document.write(power + "<br>");
    }
}
</script>

</body>
</html>
